  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      background: linear-gradient(170deg, #1c0800 0%, #2e1400 50%, #1c0800 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.75);
      background: #fff8f0;
    }

    /* Header */
    .header {
      background: #3d1500;
      padding: 14px 20px 16px;
      text-align: center;
    }

    .header-text {
      color: #f0c882;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 3.5px;
      text-transform: uppercase;
    }

    /* Imagem full-width */
    .img-wrap {
      position: relative;
      width: 100%;
      background: #2e1400;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .img-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: linear-gradient(transparent, #fff8f0);
    }

    .hero-fallback {
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, #3d1c08, #6b3010);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    /* Divisor com cruz */
    .divider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 28px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #b06820);
    }

    .divider-line.right {
      background: linear-gradient(90deg, #b06820, transparent);
    }

    .divider-icon {
      color: #b06820;
      font-size: 15px;
    }

    /* Conteúdo */
    .content {
      padding: 18px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .headline {
      font-family: 'EB Garamond', serif;
      font-size: clamp(26px, 7.5vw, 34px);
      font-weight: 800;
      color: #1c0800;
      text-align: center;
      line-height: 1.25;
    }

    .headline em {
      font-style: italic;
      color: #8b3e10;
    }

    .subtext {
      font-size: 12px;
      font-weight: 800;
      color: #9a6640;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Botão CTA */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 17px 20px;
      background: linear-gradient(135deg, #b85015, #cc6820, #e08030);
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 18px;
      font-weight: 900;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(160, 70, 10, 0.55);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: glowBrown 2.4s ease-in-out infinite;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(160, 70, 10, 0.75);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    @keyframes glowBrown {

      0%,
      100% {
        box-shadow: 0 6px 24px rgba(160, 70, 10, 0.50);
      }

      50% {
        box-shadow: 0 6px 38px rgba(160, 70, 10, 0.88);
      }
    }

    .trust {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #a08060;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      color: rgba(255, 255, 255, 0.42);
      font-size: 11px;
      line-height: 2;
    }

    footer a {
      color: rgba(255, 255, 255, 0.62);
      text-decoration: underline;
    }
